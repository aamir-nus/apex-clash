services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      PORT: 4000
      CLIENT_ORIGIN: http://localhost:8080
      MONGODB_URI: mongodb://mongo:27017/apex-clash
    ports:
      - "4000:4000"
    depends_on:
      mongo:
        condition: service_started
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
